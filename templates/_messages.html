{% if messages %}
    <div class="px-3 pt-3 px-lg-0 pt-lg-0 mb-0">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show et-animate" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    </div>
{% endif %}
